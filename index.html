<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 300px;
        color: aliceblue;
        background-color: orangered;
      }
      #class {
        width: 120px;
        height: 80px;
        background-color: white;
        border: 3px solid rgb(38, 255, 233);
        border-radius: 20%;
      }
      button:hover {
        transition: all 0.5s ease-in-out;
        cursor: pointer;
        color: chocolate;
        background-color: #b0920b;
      }
    </style>
  </head>
  <body>
    <button id="class">Sign up</button>
  </body>
</html>
